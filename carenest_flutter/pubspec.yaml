name: carenest_app
description: CareNest - Integrated Residential Eldercare Management System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP client
  dio: ^5.4.0

  # State management
  provider: ^6.1.1

  # Secure token storage
  flutter_secure_storage: ^9.0.0

  # Navigation
  go_router: ^13.0.0

  # UI extras
  intl: ^0.19.0
  cupertino_icons: ^1.0.6
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/carenest_logo.png"
   
flutter:
  uses-material-design: true
  assets:
    - assets/images/